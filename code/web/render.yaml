services:
  - type: web
    name: wlj-buffett-wiki
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: ACCESS_PASSWORD
        sync: false
